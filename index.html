<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F6FB">
<title>Ahorro en común</title>
<style>
  :root{
    --bg:#F7F6FB; --card:#FFFFFF; --line:#ECEAF4;
    --tx:#2B2D36; --tx2:#8E93A0; --tx3:#B6BAC4;
    --mint:#9AD9BC; --mint-d:#2E7D58; --mint-bg:#E4F4EC; --ring:#7ECBA1;
    --lav:#B9B4F0; --lav-d:#5A50B0; --lav-bg:#DCD9F6;
    --peach:#F3B79A; --peach-d:#B96A41; --peach-bg:#FBE7DD;
    --blue:#92C3EE; --blue-bg:#DCEEF9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 28px}
  .app{max-width:460px;margin:0 auto;padding:16px}
  .head{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 16px;min-height:34px}
  .title{font-size:20px;font-weight:600}
  .sub{font-size:12px;color:var(--tx2);margin-top:1px}
  .avs{display:flex}
  .av{width:32px;height:32px;border-radius:50%;font-size:13px;font-weight:600;
    display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
  .av.n{background:var(--mint-bg);color:var(--mint-d);margin-left:-9px}
  .av.a{background:var(--lav-bg);color:var(--lav-d)}
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}
  .lbl{font-size:13px;color:var(--tx2)}
  .big{font-size:30px;font-weight:600;letter-spacing:-.5px;margin-top:3px}
  .chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:20px}
  .chip.up{background:var(--mint-bg);color:var(--mint-d)}
  .chip.dn{background:var(--peach-bg);color:var(--peach-d)}
  .meta-row{display:flex;align-items:center;gap:16px}
  .meta-txt .m1{font-size:17px;font-weight:600;margin:2px 0}
  .meta-txt .m1 span{color:var(--tx3);font-weight:400}
  .bar{display:flex;height:12px;border-radius:8px;overflow:hidden;margin:10px 0 12px}
  .legend{display:flex;justify-content:space-between;font-size:13px}
  .legend span{display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .note{margin-top:12px;font-size:12px;padding:6px 10px;border-radius:10px;display:flex;align-items:center;gap:6px}
  .note.ok{background:var(--mint-bg);color:var(--mint-d)}
  .note.warn{background:var(--peach-bg);color:var(--peach-d)}
  .prow{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .pval{font-weight:600}
  .ptrack{height:8px;background:#EFEDF4;border-radius:6px;margin-bottom:12px}
  .pfill{height:8px;border-radius:6px}
  .pmeta{font-size:11px;color:var(--tx2);margin:-8px 0 12px}
  .grow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:0.5px solid var(--line)}
  .grow:first-of-type{border-top:0;padding-top:0}
  .gp{font-size:14px;font-weight:500}
  .gd{font-size:11px;color:var(--tx2);margin-top:1px}
  .gm{font-size:14px;font-weight:600;color:var(--peach-d);white-space:nowrap;padding-left:10px}
  .foot{text-align:center;font-size:11px;color:var(--tx3);margin-top:4px}
  .foot a,.verlink{color:var(--lav-d);text-decoration:none}
  .state{text-align:center;padding:48px 20px;color:var(--tx2);font-size:14px}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--ring);border-radius:50%;margin:0 auto 14px;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .btn{appearance:none;border:.5px solid var(--line);background:var(--card);color:var(--tx);font:inherit;font-size:13px;padding:8px 16px;border-radius:12px;cursor:pointer}
  /* nuevas */
  .seg{display:flex;gap:5px;background:#F0EEF6;border-radius:12px;padding:4px}
  .seg button{flex:1;appearance:none;border:0;background:transparent;font:inherit;font-size:12px;font-weight:500;color:var(--tx2);padding:7px 4px;border-radius:9px;cursor:pointer}
  .seg button.active{background:#fff;color:var(--tx);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center}
  .pgrid .pv{font-size:19px;font-weight:600}
  .pgrid .pk{font-size:11px;color:var(--tx2);margin-top:2px}
  .verlink{display:block;text-align:center;font-size:13px;font-weight:500;padding:13px;background:#fff;border:.5px solid var(--line);border-radius:14px;margin-bottom:12px}
  details.card summary{cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between}
  details.card summary::-webkit-details-marker{display:none}
  .caret{color:var(--tx3);transition:transform .2s;font-size:18px}
  details[open] .caret{transform:rotate(90deg)}
  .back{display:inline-flex;align-items:center;gap:4px;font-size:15px;color:var(--lav-d);text-decoration:none;font-weight:500}
  .chips-f{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .chip-f{appearance:none;border:.5px solid var(--line);background:#fff;font:inherit;font-size:13px;color:var(--tx2);padding:6px 14px;border-radius:20px;cursor:pointer}
  .chip-f.active{background:var(--lav-bg);border-color:var(--lav-bg);color:var(--lav-d);font-weight:600}
  .dates{display:flex;gap:10px}
  .dates label{flex:1;font-size:12px;color:var(--tx2)}
  .dates input{width:100%;margin-top:4px;font:inherit;font-size:13px;padding:8px 10px;border:.5px solid var(--line);border-radius:10px;color:var(--tx);background:#fff}
  .hrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:.5px solid var(--line)}
  .hrow:first-of-type{border-top:0}
  .hmain{font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px}
  .hsub{font-size:11px;color:var(--tx2);margin-top:2px}
  .hbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px}
  .hamt{font-size:14px;font-weight:600;white-space:nowrap;padding-left:10px}
  .mintbg{background:var(--mint-bg);color:var(--mint-d)}
  .peachbg{background:var(--peach-bg);color:var(--peach-d)}
  .sumrow{display:flex;align-items:center;justify-content:space-between}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}}
</style>
</head>
<body>
<div class="app"><div id="view"><div class="state"><div class="spin"></div>Cargando sus ahorros…</div></div></div>

<script>
const MOV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3uD8SYvrorMPbJ1nHBhi18wc2ogsrfFDNhucPYWmNxbJAqFRmmi6L6qQFArOvA0JTCw4HeAZbRMo/pub?gid=1395618965&single=true&output=csv";
const CFG_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3uD8SYvrorMPbJ1nHBhi18wc2ogsrfFDNhucPYWmNxbJAqFRmmi6L6qQFArOvA0JTCw4HeAZbRMo/pub?gid=1455132625&single=true&output=csv";
const PASTELS=["#9AD9BC","#B9B4F0","#F3B79A","#92C3EE","#F2B8D0","#F2D79A","#A9E0D6"];
const MES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const money=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n||0);
const money0=n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const norm=s=>(s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().toLowerCase();
const isAp=x=>x.tipo.startsWith("aporte"),isGa=x=>x.tipo.startsWith("gasto"),ABS=x=>Math.abs(x.monto);
const fmtDate=d=>d?`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`:"";

function parseCSV(t){
  const rows=[];let row=[],f="",q=false;
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){ if(c==='"'){ if(t[i+1]==='"'){f+='"';i++} else q=false } else f+=c }
    else{ if(c==='"')q=true;
      else if(c===","){row.push(f);f=""}
      else if(c==="\n"){row.push(f);rows.push(row);row=[];f=""}
      else if(c==="\r"){}
      else f+=c }
  }
  row.push(f);rows.push(row);
  return rows.filter(r=>r.some(x=>x!==""));
}
function num(v){
  if(v==null)return 0;
  let s=v.toString().replace(/[^0-9.,-]/g,"").trim();
  if(!s)return 0;
  const hasC=s.includes(","),hasD=s.includes(".");
  if(hasC&&hasD){ const dec=s.lastIndexOf(",")>s.lastIndexOf(".")?",":".";
    s=s.replace(dec===","?/\./g:/,/g,"").replace(",",".") }
  else if(hasC){ const after=s.split(",")[1]||""; s=after.length===2?s.replace(",","."):s.replace(/,/g,"") }
  const n=parseFloat(s);return isNaN(n)?0:n;
}
function pdate(v){
  const m=(v||"").toString().trim().match(/(\d{1,4})[\/\-](\d{1,2})[\/\-](\d{1,4})/);
  if(!m)return null;
  let a=+m[1],b=+m[2],c=+m[3];
  if(a>31)return new Date(a,b-1,c);
  return new Date(c,b-1,a);
}
const colIdx=(hdr,names)=>{for(const n of names){const i=hdr.findIndex(h=>norm(h)===n);if(i>=0)return i}return -1};

function processMov(rows){
  if(!rows.length)return [];
  const h=rows[0];
  const ci={fecha:colIdx(h,["fecha"]),quien:colIdx(h,["quien"]),tipo:colIdx(h,["tipo"]),
    monto:colIdx(h,["monto"]),prop:colIdx(h,["proposito"]),nota:colIdx(h,["nota"])};
  const out=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const tipo=norm(row[ci.tipo]);
    const monto=num(row[ci.monto]);
    if(!tipo&&!monto)continue;
    out.push({fecha:pdate(row[ci.fecha]),quien:(row[ci.quien]||"").trim(),
      tipo:tipo,monto:monto,prop:(row[ci.prop]||"").trim()||"Sin propósito",
      nota:(row[ci.nota]||"").trim()});
  }
  return out;
}
function parseConfig(rows){
  let meta=0;const metas={};let pStart=-1,pEnd=rows.length;
  for(let r=0;r<rows.length;r++){
    const a=norm(rows[r][0]);
    if(a.includes("meta comun")){for(let c=1;c<rows[r].length;c++){const n=num(rows[r][c]);if(n>0){meta=n;break}}}
    if(a==="proposito")pStart=r+1;
    if(a.includes("lista")&&pStart>=0&&r>pStart){pEnd=r;break}
  }
  if(pStart>=0)for(let r=pStart;r<pEnd;r++){
    const name=(rows[r][0]||"").trim();if(!name)continue;
    const m=num(rows[r][1]);if(m>0)metas[norm(name)]=m;
  }
  return {meta,metas};
}
function compute(mov){
  const aportado=mov.filter(isAp).reduce((s,x)=>s+ABS(x),0);
  const gastado=mov.filter(isGa).reduce((s,x)=>s+ABS(x),0);
  const saldo=aportado-gastado;
  const per={},perComun={};
  for(const x of mov)if(isAp(x)){const k=x.quien||"—";
    per[k]=(per[k]||0)+ABS(x);
    if(norm(x.prop)==="ahorro comun")perComun[k]=(perComun[k]||0)+ABS(x);}
  const props={},gastos=[];
  for(const x of mov){const k=x.prop;props[k]=props[k]||{ap:0,ga:0};
    if(isAp(x))props[k].ap+=ABS(x);else if(isGa(x)){props[k].ga+=ABS(x);gastos.push(x);}}
  gastos.sort((a,b)=>(b.fecha||0)-(a.fecha||0));
  const sorted=mov.filter(x=>x.fecha).sort((a,b)=>a.fecha-b.fecha);
  let run=0;const byMonth={};
  for(const x of sorted){run+=(isGa(x)?-1:1)*ABS(x);
    byMonth[x.fecha.getFullYear()+"-"+x.fecha.getMonth()]={v:run,d:x.fecha}}
  const series=[];for(const k in byMonth)series.push(byMonth[k]);
  series.sort((a,b)=>a.d-b.d);
  return {aportado,gastado,saldo,per,perComun,props,gastos,series};
}

function toD(x){return x?(x instanceof Date?x:new Date(x+"T00:00:00")):null}
function inRange(d,from,to){from=toD(from);to=toD(to);
  if(!from&&!to)return true; if(!d)return false;
  if(from&&d<from)return false;
  if(to){const t=new Date(to);t.setHours(23,59,59,999);if(d>t)return false;}
  return true;}
function periodRange(p){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  if(p==="mes")return{from:new Date(y,m,1),to:new Date(y,m+1,0,23,59,59)};
  if(p==="trim")return{from:new Date(y,m-2,1),to:new Date(y,m+1,0,23,59,59)};
  if(p==="ano")return{from:new Date(y,0,1),to:new Date(y,11,31,23,59,59)};
  return{from:null,to:null};
}

function ring(pct){
  const r=34,c=2*Math.PI*r,dash=Math.max(0,Math.min(1,pct))*c;
  return `<svg width="84" height="84" viewBox="0 0 84 84" role="img" aria-label="Progreso ${Math.round(pct*100)} por ciento">
    <circle cx="42" cy="42" r="34" fill="none" stroke="#EFEDF4" stroke-width="10"/>
    <circle cx="42" cy="42" r="34" fill="none" stroke="var(--ring)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${dash.toFixed(1)} ${c.toFixed(1)}" transform="rotate(-90 42 42)"/>
    <text x="42" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="var(--tx)">${Math.round(pct*100)}%</text>
    <text x="42" y="54" text-anchor="middle" font-size="9" fill="var(--tx2)">meta</text></svg>`;
}
function area(series){
  if(series.length<2){const v=series.length?money0(series[0].v):"$0";
    return `<div style="font-size:13px;color:var(--tx2);padding:6px 0">Aún no hay suficiente historial. Saldo: ${v}</div>`}
  const W=300,H=80,pad=8,n=series.length,max=Math.max(...series.map(s=>s.v),1);
  const xs=i=>10+i*((W-20)/(n-1)),ys=v=>H-(v/max)*(H-pad);
  let line="M"+series.map((s,i)=>`${xs(i).toFixed(1)},${ys(s.v).toFixed(1)}`).join(" L");
  const fill=line+` L${xs(n-1).toFixed(1)},${H} L${xs(0).toFixed(1)},${H} Z`;
  const labels=series.map((s,i)=>`<text x="${xs(i).toFixed(0)}" y="${H+11}" font-size="9" fill="var(--tx3)" text-anchor="middle">${MES[s.d.getMonth()]}</text>`).join("");
  return `<svg width="100%" viewBox="0 0 ${W} ${H+15}" role="img" aria-label="Crecimiento del ahorro">
    <path d="${fill}" fill="var(--blue-bg)"/>
    <path d="${line}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${xs(n-1).toFixed(1)}" cy="${ys(series[n-1].v).toFixed(1)}" r="4" fill="var(--blue)"/>
    ${labels}</svg>`;
}
function rowHTML(x){
  const ga=isGa(x),f=fmtDate(x.fecha);
  const badge=ga?'<span class="hbadge peachbg">Gasto</span>':'<span class="hbadge mintbg">Aporte</span>';
  const sub=[f,x.prop,x.nota].filter(Boolean).join(" · ");
  return `<div class="hrow"><div><div class="hmain"><span class="dot" style="background:${ga?'var(--peach)':'var(--mint)'}"></span>${x.quien||"—"} ${badge}</div><div class="hsub">${sub}</div></div>
    <div class="hamt" style="color:${ga?'var(--peach-d)':'var(--mint-d)'}">${ga?'−':'+'}${money0(ABS(x))}</div></div>`;
}

/* ---------- DASHBOARD ---------- */
function dashboardView(mov,cfg){
  const d=compute(mov);
  const meta=cfg.meta||0,pct=meta>0?d.saldo/meta:0,falta=Math.max(meta-d.saldo,0);
  // proyección
  let proj;
  if(meta<=0)proj=`<div class="lbl">Define una meta en Config para ver la proyección.</div>`;
  else if(d.saldo>=meta)proj=`<div style="font-size:18px;font-weight:600;color:var(--mint-d)">🎉 ¡Meta alcanzada!</div>`;
  else if(d.series.length<1)proj=`<div class="lbl">Aún no hay suficiente historial para proyectar.</div>`;
  else{const rate=d.saldo/d.series.length;
    if(rate<=0)proj=`<div class="lbl">A este ritmo no avanzan. Suban el aporte para llegar a la meta.</div>`;
    else{const left=Math.ceil(falta/rate);const dt=new Date();dt.setDate(1);dt.setMonth(dt.getMonth()+left);
      proj=`<div style="font-size:19px;font-weight:600">≈ ${MES[dt.getMonth()]} ${dt.getFullYear()}</div>
        <div class="lbl" style="margin-top:2px">A su ritmo (~${money0(rate)}/mes) · faltan ~${left} ${left===1?'mes':'meses'}</div>`;}}
  // resumen período
  const r=periodRange(state.period),fp=mov.filter(x=>inRange(x.fecha,r.from,r.to));
  const apP=fp.filter(isAp).reduce((s,x)=>s+ABS(x),0),gaP=fp.filter(isGa).reduce((s,x)=>s+ABS(x),0);
  const perP={};fp.forEach(x=>{if(isAp(x)){const k=x.quien||"—";perP[k]=(perP[k]||0)+ABS(x)}});
  const perStr=Object.keys(perP).length?Object.keys(perP).map(k=>k+" "+money0(perP[k])).join(" · "):"Sin aportes en el período";
  const segs=[["mes","Mes"],["trim","Trim."],["ano","Año"],["todo","Todo"]];
  // balance común
  const balSrc=Object.keys(d.perComun).length?d.perComun:d.per;
  const ppl=Object.keys(balSrc),tot=ppl.reduce((s,k)=>s+balSrc[k],0)||1;
  const pa=ppl.map((k,i)=>({k,v:balSrc[k],pct:balSrc[k]/tot,c:PASTELS[i%PASTELS.length]})).sort((a,b)=>b.v-a.v);
  let balNote="",balCls="ok";
  if(pa.length===2){const diff=Math.abs(pa[0].v-pa[1].v),lead=pa[0].v>=pa[1].v?pa[0].k:pa[1].k;
    balCls=diff<=50?"ok":"warn";
    balNote=diff===0?"Parejos — van igualitos":`${diff<=50?"Parejos":"Atención"} — ${lead} va ${money0(diff)} adelante`;}
  // por propósito
  const propKeys=Object.keys(d.props).filter(k=>d.props[k].ap>0||d.props[k].ga>0)
    .map(k=>({k,...d.props[k],saldo:d.props[k].ap-d.props[k].ga})).sort((a,b)=>b.saldo-a.saldo);
  const maxP=Math.max(...propKeys.map(p=>p.saldo),1);const pc={};propKeys.forEach((p,i)=>pc[p.k]=PASTELS[i%PASTELS.length]);
  let propHTML="";
  for(const p of propKeys){const mk=cfg.metas[norm(p.k)],col=pc[p.k];
    propHTML+=`<div class="prow"><span>${p.k}</span><span class="pval">${money(p.saldo)}</span></div>
      <div class="ptrack"><div class="pfill" style="width:${Math.max(4,(p.saldo/maxP)*100).toFixed(0)}%;background:${col}"></div></div>`;
    if(mk)propHTML+=`<div class="pmeta">meta ${money0(mk)} · ${Math.round(Math.min(p.saldo/mk,1)*100)}%</div>`;
    if(p.ga>0)propHTML+=`<div class="pmeta">aportado ${money0(p.ap)} · gastado ${money0(p.ga)}</div>`;}
  // gastos
  let gastosHTML=d.gastos.length?d.gastos.map(g=>{
    const f=fmtDate(g.fecha),title=g.nota||g.prop,sub=[f,g.nota?g.prop:""].filter(Boolean).join(" · ");
    return `<div class="grow"><div><div class="gp">${title}</div>${sub?`<div class="gd">${sub}</div>`:""}</div><div class="gm">−${money0(ABS(g))}</div></div>`;
  }).join(""):'<div style="font-size:13px;color:var(--tx2)">Sin gastos registrados todavía.</div>';
  // historial reciente
  const recent=mov.slice().sort((a,b)=>(b.fecha||0)-(a.fecha||0)).slice(0,6).map(rowHTML).join("");

  return `
  <div class="head">
    <div><div class="title">Ahorro en común</div><div class="sub">Ari &amp; Nelson</div></div>
    <div class="avs"><div class="av a">A</div><div class="av n">N</div></div>
  </div>

  <div class="card">
    <div class="lbl">Saldo disponible</div>
    <div class="big">${money(d.saldo)}</div>
    <div class="chips"><span class="chip up">↑ Aportado ${money0(d.aportado)}</span><span class="chip dn">↓ Gastado ${money0(d.gastado)}</span></div>
  </div>

  <div class="card meta-row">${ring(pct)}
    <div class="meta-txt"><div class="lbl">Meta común</div>
      <div class="m1">${money0(d.saldo)} <span>de</span> ${money0(meta)}</div>
      <div class="lbl">${meta>0?"Faltan "+money0(falta):"Define la meta en Config"}</div></div>
  </div>

  <div class="card"><div class="lbl" style="margin-bottom:6px">Proyección de la meta</div>${proj}</div>

  <div class="card">
    <div class="lbl" style="margin-bottom:12px">Resumen del período</div>
    <div class="seg" style="margin-bottom:14px">${segs.map(s=>`<button class="${state.period===s[0]?'active':''}" onclick="setP('${s[0]}')">${s[1]}</button>`).join("")}</div>
    <div class="pgrid">
      <div><div class="pv" style="color:var(--mint-d)">${money0(apP)}</div><div class="pk">Aportado</div></div>
      <div><div class="pv" style="color:var(--peach-d)">${money0(gaP)}</div><div class="pk">Gastado</div></div>
      <div><div class="pv">${money0(apP-gaP)}</div><div class="pk">Neto</div></div>
    </div>
    <div class="lbl" style="margin-top:12px;text-align:center">${perStr}</div>
  </div>

  <div class="card">
    <div class="lbl">Quién va aportando <span style="color:var(--tx3)">· ahorro común</span></div>
    <div class="bar">${pa.map(p=>`<div style="width:${(p.pct*100).toFixed(1)}%;background:${p.c}"></div>`).join("")}</div>
    <div class="legend">${pa.map(p=>`<span><span class="dot" style="background:${p.c}"></span>${p.k} <span style="color:var(--tx2)">· ${money0(p.v)}</span></span>`).join("")}</div>
    ${balNote?`<div class="note ${balCls}">${balCls==="ok"?"✓":"!"} ${balNote}</div>`:""}
  </div>

  <div class="card"><div class="lbl" style="margin-bottom:12px">Por propósito</div>${propHTML}</div>

  <div class="card">
    <div class="prow" style="margin-bottom:10px"><span class="lbl">Gastos</span><span class="pval" style="color:var(--peach-d)">−${money0(d.gastado)}</span></div>
    ${gastosHTML}
  </div>

  <div class="card"><div class="lbl" style="margin-bottom:10px">Crecimiento del ahorro</div>${area(d.series)}</div>

  <details class="card"><summary><span class="lbl">Historial reciente</span><span class="caret">›</span></summary>
    <div style="margin-top:12px">${recent||'<div class="lbl">Sin movimientos.</div>'}</div>
  </details>
  <a class="verlink" href="#historial">Ver historial completo  →</a>

  <div class="foot">Actualizado ${new Date().toLocaleString("es-PA",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})} · <a href="#" onclick="load();return false">Actualizar</a></div>`;
}

/* ---------- HISTORIAL ---------- */
function historialView(mov){
  const list=mov.filter(x=>(state.hp==="todos"||norm(x.quien)===norm(state.hp))&&inRange(x.fecha,state.hf,state.ht))
    .sort((a,b)=>(b.fecha||0)-(a.fecha||0));
  const ap=list.filter(isAp).reduce((s,x)=>s+ABS(x),0),ga=list.filter(isGa).reduce((s,x)=>s+ABS(x),0);
  const chips=["Todos","Ari","Nelson","Cuenta"];
  const rows=list.length?list.map(rowHTML).join(""):'<div class="state" style="padding:28px">Sin movimientos con estos filtros.</div>';
  const filtered=state.hf||state.ht||state.hp!=="todos";
  return `
  <div class="head"><a class="back" href="#">‹ Volver</a></div>
  <div class="title" style="margin:0 2px 16px">Historial</div>
  <div class="card">
    <div class="chips-f">${chips.map(c=>{const v=c==="Todos"?"todos":c;return `<button class="chip-f ${norm(state.hp)===norm(v)?'active':''}" onclick="setHP('${v}')">${c}</button>`}).join("")}</div>
    <div class="dates">
      <label>Desde<input type="date" value="${state.hf}" onchange="setHF(this.value)"></label>
      <label>Hasta<input type="date" value="${state.ht}" onchange="setHT(this.value)"></label>
    </div>
    ${filtered?`<a href="#" onclick="clearF();return false" style="display:inline-block;margin-top:12px;font-size:12px;color:var(--lav-d);text-decoration:none">Limpiar filtros</a>`:""}
  </div>
  <div class="card">
    <div class="sumrow" style="margin-bottom:6px"><span class="lbl">${list.length} movimiento${list.length===1?'':'s'}</span>
      <span style="font-size:12px"><span style="color:var(--mint-d)">+${money0(ap)}</span> &nbsp;<span style="color:var(--peach-d)">−${money0(ga)}</span></span></div>
    ${rows}
  </div>`;
}

/* ---------- estado + router ---------- */
let DATA=null;
const state={period:"todo",hp:"todos",hf:"",ht:""};
function setP(p){state.period=p;render()}
function setHP(p){state.hp=p;render()}
function setHF(v){state.hf=v;render()}
function setHT(v){state.ht=v;render()}
function clearF(){state.hp="todos";state.hf="";state.ht="";render()}
function render(){
  if(!DATA)return;
  const v=location.hash==="#historial"?historialView(DATA.mov):dashboardView(DATA.mov,DATA.cfg);
  document.getElementById("view").innerHTML=v;
}
async function load(){
  document.getElementById("view").innerHTML='<div class="state"><div class="spin"></div>Cargando sus ahorros…</div>';
  try{
    const [mt,ct]=await Promise.all([
      fetch(MOV_URL).then(r=>{if(!r.ok)throw 0;return r.text()}),
      fetch(CFG_URL).then(r=>r.ok?r.text():"")
    ]);
    const mov=processMov(parseCSV(mt)),cfg=parseConfig(parseCSV(ct||""));
    if(!mov.length){document.getElementById("view").innerHTML='<div class="state">No se encontraron movimientos todavía.</div>';return}
    DATA={mov,cfg};render();
  }catch(e){
    document.getElementById("view").innerHTML='<div class="state">No se pudo leer la hoja. Revisa que siga publicada en la web.<br><br><button class="btn" onclick="load()">Reintentar</button></div>';
  }
}
window.addEventListener("hashchange",()=>{window.scrollTo(0,0);render()});
load();
</script>
</body>
</html>
